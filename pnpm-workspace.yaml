packages:
  - apps/*
  - examples/*
  - packages/**
  - benchmarks/*

allowBuilds:
  "@tailwindcss/oxide": true
  esbuild: true
  simple-git-hooks: true

overrides:
  # read-yaml-file@1 pulls js-yaml@3 (GHSA-h67p-54hq-rp68 DoS, no 3.x patch
  # exists). v2 uses the API-compatible js-yaml@4. Only consumer is the
  # transitive @manypkg/get-packages via @changesets/cli.
  read-yaml-file@1: ^2.1.0

catalog:
  "@babel/core": ^8.0.1
  "@babel/plugin-proposal-decorators": 8.0.2
  "@changesets/changelog-github": ^0.7.0
  "@changesets/cli": ^2.31.0
  # Published @codefast/* versions consumed by examples/* (which install from npm,
  # not workspace: links). Changesets ignores catalog entries, so these are not
  # auto-bumped on release — bump them by hand when an example should track a newer release.
  "@codefast/di": 0.5.0-canary.2
  "@codefast/tailwind-variants": 0.5.0-canary.2
  "@codefast/theme": 0.5.0-canary.2
  "@codefast/typescript-config": 0.5.0-canary.2
  "@codefast/ui": 0.5.0-canary.2
  "@commitlint/cli": ^21.2.1
  "@commitlint/config-conventional": ^21.2.0
  # Static Inter TTFs for the OG-image script — resvg cannot read the woff2 variable font above.
  "@expo-google-fonts/inter": ^0.4.2
  "@fontsource-variable/inter": ^5.2.8
  "@hono/node-server": ^2.0.8
  "@resvg/resvg-js": ^2.6.2
  "@rolldown/plugin-babel": ^0.2.3
  "@standard-schema/spec": ^1.1.0
  "@tailwindcss/postcss": ^4.3.2
  "@tailwindcss/vite": ^4.3.2
  "@tanstack/devtools-vite": ^0.8.1
  "@tanstack/react-devtools": ^0.10.8
  "@tanstack/react-router": ^1.170.17
  "@tanstack/react-router-devtools": ^1.167.0
  "@tanstack/react-start": ^1.168.27
  "@tanstack/react-table": ^8.21.3
  # Experimental — powers build-time Shiki highlighting (peer-deps react-start ^1.168.25).
  "@testing-library/dom": ^10.4.1
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@testing-library/user-event": ^14.6.1
  "@tsdown/css": ^0.22.8
  "@types/jest-axe": ^3.5.9
  "@types/node": ^26.1.0
  "@types/picomatch": ^4.0.3
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@typescript/native": "npm:typescript@^7.0.2"
  "@unpic/react": ^1.0.2
  "@vercel/analytics": ^2.0.1
  "@vitejs/plugin-react": ^6.0.3
  "@vitest/coverage-v8": ^4.1.10
  babel-plugin-react-compiler: ^1.0.0
  chart.js: ^4.5.1
  chartjs-plugin-zoom: ^2.2.0
  class-variance-authority: ^0.7.1
  chrono-node: ^2.10.0
  clsx: ^2.1.1
  cmdk: ^1.1.1
  commander: ^15.0.0
  date-fns-jalali: 4.4.0-0
  embla-carousel-autoplay: ^8.6.0
  embla-carousel-react: ^8.6.0
  expect-type: ^1.4.0
  hono: ^4.12.30
  input-otp: ^1.4.2
  inversify: ^8.1.1
  jest-axe: ^10.0.0
  jiti: ^2.7.0
  jsdom: ^29.1.1
  knip: ^6.26.0
  lint-staged: ^17.0.8
  lucide-react: ^1.23.0
  next-themes: ^0.4.6
  nitro: 3.0.260610-beta
  oxfmt: ^0.58.0
  oxlint: ^1.73.0
  oxlint-tsgolint: ^0.24.0
  picomatch: ^4.0.5
  postcss: ^8.5.16
  postcss-import: ^16.1.1
  radix-ui: ^1.6.2
  react: ^19.2.7
  "@daypicker/react": ^10.0.1
  react-dom: ^19.2.7
  react-hook-form: ^7.81.0
  react-resizable-panels: ^4.12.2
  recharts: ^3.9.2
  reflect-metadata: ^0.2.2
  shiki: ^4.3.1
  simple-git-hooks: ^2.13.1
  sonner: ^2.0.7
  tailwind-merge: ^3.6.0
  tailwind-variants: ^3.2.2
  tailwindcss: ^4.3.2
  tinybench: ^6.0.2
  tsdown: ^0.22.3
  tsx: ^4.23.0
  turbo: ^2.10.4
