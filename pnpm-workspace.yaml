# `manual` (not `strict`): the catalog is a convenience, not enforced repo-wide.
catalogMode: manual

# 1h maturation window instead of pnpm's 24h default — short enough that our own
# canary releases and pinned deps (e.g. playwright) age past it without needing
# minimumReleaseAgeExclude entries.
minimumReleaseAge: 60
