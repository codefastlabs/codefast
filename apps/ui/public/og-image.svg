<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09090b" />
      <stop offset="1" stop-color="#0c1620" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(1000 90) rotate(130) scale(620 620)">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.30" />
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0" />
    </radialGradient>
    <style>
      text { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect x="0" y="0" width="1200" height="6" fill="#0ea5e9" />

  <!-- Brand mark -->
  <text x="80" y="120" font-size="34" font-weight="700" fill="#fafafa">
    codefast<tspan fill="#38bdf8">/ui</tspan>
  </text>

  <!-- Headline -->
  <text x="78" y="320" font-size="84" font-weight="800" letter-spacing="-2" fill="#fafafa">Beautiful, accessible</text>
  <text x="78" y="420" font-size="84" font-weight="800" letter-spacing="-2" fill="#fafafa">React components</text>

  <!-- Sub — the count and og-image.png are written by scripts/generate-og-image.ts; run `pnpm generate:og` in apps/ui -->
  <text x="80" y="500" font-size="30" font-weight="500" fill="#a3a3a3">
    70+ components · Radix UI · Tailwind CSS v4 · React 19
  </text>

  <!-- Footer line -->
  <text x="80" y="566" font-size="24" font-weight="500" fill="#71717a">Copy the source. Own the code.</text>
</svg>
