# Dependabot — pnpm workspace + catalog (pnpm-workspace.yaml).
# Single root directory: Dependabot resolves the whole workspace and updates pnpm-lock.yaml.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    versioning-strategy: "auto"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      prefix-development: "chore(dev)"
      include: "scope"
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Zod is shared via catalog across apps/docs, packages/cli, packages/theme; bump majors deliberately.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
    groups:
      # Order matters: first matching group wins (see react vs typescript @types).
      react-core:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      typescript:
        patterns:
          - "typescript"
          - "@typescript/*"
          - "@types/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "jest-axe"
          - "@types/jest-axe"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
          - "expect-type"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "tailwind-merge"
          - "tailwind-variants"
          - "@tailwindcss/*"
          - "tw-animate-css"
      remark-rehype:
        patterns:
          - "remark-*"
          - "rehype-*"
          - "unified"
          - "unist-*"
          - "hast-*"
      content-collections:
        patterns:
          - "@content-collections/*"
      shiki:
        patterns:
          - "shiki"
          - "@shikijs/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "@rolldown/*"
          - "babel-plugin-react-compiler"
      repo-tooling:
        patterns:
          - "turbo"
          - "tsdown"
          - "esbuild"
          - "tsx"
          - "jiti"
          - "ts-node"
          - "@changesets/*"
          - "@commitlint/*"
          - "knip"
          - "lint-staged"
          - "simple-git-hooks"
          - "oxlint*"
          - "oxfmt"
          - "unplugin-swc"
          - "@swc/core"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
