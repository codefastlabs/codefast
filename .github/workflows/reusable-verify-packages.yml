# Step order: type-aware oxlint (.oxlintrc.json) requires built `dist` typings for workspace `package.json` exports.
# Sequence — build packages, repository lint/format (`pnpm check`), then package test and check-types.

name: Reusable verify packages

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify-packages:
    name: Verify packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: production
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN || secrets.VERCEL_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Build packages
        run: npx turbo build --filter="./packages/**"

      - name: Lint and format (root)
        run: pnpm check

      - name: Test and check-types packages
        run: npx turbo run test:coverage:ci check-types --filter="./packages/**"

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: codefastlabs/codefast
          fail_ci_if_error: false
