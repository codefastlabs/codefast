# Step order: type-aware oxlint needs built `dist` typings for workspace `package.json` exports.
# Sequence — build packages, then lint + format check + check-types, then (heavy lane only) tests with coverage.

name: Reusable verify packages

on:
  workflow_call:
    inputs:
      run-tests:
        description: >-
          Run the heavy coverage suite. Pass false for fast lint/type-only
          feedback when another lane already covers tests.
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  verify-packages:
    name: Workspace Package Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: production
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure Build Environment
        uses: ./.github/actions/setup-environment

      - name: Build Workspace Packages
        run: npx turbo build --filter="./packages/**"

      - name: Validate Code Quality and Type Safety
        run: npx turbo run lint format:check check-types --filter="./packages/**"

      - name: Execute Automated Tests with Coverage
        if: ${{ inputs.run-tests }}
        run: npx turbo run test:coverage --filter="./packages/**"

      - name: Publish Coverage Results to Codecov
        if: ${{ inputs.run-tests }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          fail_ci_if_error: false
