name: Auto-merge

# Queues PRs for auto-merge once required checks pass, in two lanes:
#   - Dependabot: non-major dependency bumps (majors left for manual review).
#   - Owner: every non-draft PR authored by the maintainer.
# Requires the repo's branch ruleset on main (required "Verify" check + merge
# queue); without it there is nothing for auto-merge to wait on.
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >-
      github.actor == 'dependabot[bot]' ||
      (github.event.pull_request.user.login == 'thevuong' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        if: github.actor == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@v2

      - name: Enable auto-merge
        # Dependabot skips majors; the owner lane always enables.
        if: >-
          github.actor != 'dependabot[bot]' ||
          steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
