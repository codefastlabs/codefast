name: Package release

on:
  push:
    branches:
      - main
      - canary
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/reusable-verify-packages.yml"
      - ".github/actions/**"
      - "packages/**"
      - ".changeset/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-code:
    name: Verify packages
    uses: ./.github/workflows/reusable-verify-packages.yml
    secrets: inherit

  release:
    name: Publish packages
    runs-on: ubuntu-latest
    needs:
      - verify-code
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      NODE_ENV: production
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN || secrets.VERCEL_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Build packages
        run: npx turbo build --filter="./packages/**"

      - name: Version and publish
        uses: changesets/action@v1.7.0
        with:
          version: pnpm run version-packages
          publish: npx changeset publish
          commit: "chore: update versions for release"
          title: "chore: release new version"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
