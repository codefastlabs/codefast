name: CI

on:
  pull_request:
    branches:
      - main
      - canary
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/reusable-verify-packages.yml
    # No merge queue, so the PR run is the only pre-merge gate — run the full
    # test + coverage suite here (run-tests defaults to true).
    secrets: inherit
