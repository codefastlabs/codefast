name: CI

on:
  pull_request:
    branches:
      - main
      - canary
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/reusable-verify-packages.yml
    with:
      # PRs get fast lint/type feedback; the merge queue (and manual dispatch)
      # run the full test + coverage gate against the real merge result.
      run-tests: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
