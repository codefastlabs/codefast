name: CI

on:
  pull_request:
    branches:
      - main
      - canary

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/reusable-verify-packages.yml
    secrets: inherit
